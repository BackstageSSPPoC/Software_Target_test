apiVersion: backstage.io/v1alpha1
kind: Component

metadata:
  name: ${{values.app_name}}
  description: Service ${{values.app_name}}

  annotations:
    github.com/project-slug: BackstageSSPPoC/${{values.app_name}}
    backstage.io/techdocs-ref: dir:.
    jenkins.io/job-full-name: Backstage_SSP_PoC/${{values.app_name | trim}}/main
    argocd/app-name: ${{ values.app_name | lower }}-${{values.app_env}}
    backstage.io/kubernetes-id: ${{values.app_name}}
    sonarqube.org/project-key: ${{ values.app_name | lower }}
    # prometheus.io/rule: "kube_pod_container_resource_requests{pod=~'${{ values.app_name | lower }}.*'}|resource,kube_pod_container_status_running{pod=~'${{ values.app_name | lower }}.*'}|container"
    # prometheus.io/alert: "all"
    # prometheus.io/labels: "namespace=${{ values.app_env | lower }}"
    prometheus.io/rule: "kube_pod_container_resource_requests{pod=~'${{ values.app_name | trim | lower }}.*'}|resource,kube_pod_container_status_restarts_total{pod=~'${{ values.app_name | trim | lower }}.*'}|container"
    prometheus.io/alert: "KubePodCrashLooping,KubeDeploymentReplicasMismatch,KubePodNotReady,KubeContainerWaiting,KubeContainerOOMKilled,KubeDeploymentRolloutStuck"
    prometheus.io/labels: "namespace=${{ values.app_env }}"

spec:
  type: service
  owner: development
  lifecycle: experimental

